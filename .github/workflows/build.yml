name: CI/CD Pipeline

on:
  push:
    branches: [vscode-claude-code]
  pull_request:
    branches: [vscode-claude-code]
  schedule:
    - cron: '0 18 * * 0'  # Weekly Sunday 02:00 SGT
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if version already exists'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: vscode-claude-code
  REGISTRY: ghcr.io
  REGISTRY_USER: ${{ github.repository_owner }}
  CRANE_VERSION: v0.20.2

jobs:
  # ── Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest

    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # ── Check Release ─────────────────────────────────────────────────
  check-release:
    name: Check Upstream Release
    runs-on: ubuntu-latest

    outputs:
      skip_build: ${{ steps.check.outputs.skip_build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check for new upstream release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_BUILD: ${{ inputs.force_build }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET_VERSION=$(curl -sf "https://registry.npmjs.org/@anthropic-ai/claude-code/latest" | jq -r '.version')
            echo "version=${TARGET_VERSION}" >> "$GITHUB_OUTPUT"
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TARGET_VERSION=$(curl -sf "https://registry.npmjs.org/@anthropic-ai/claude-code/latest" | jq -r '.version')
          if [ -z "$TARGET_VERSION" ] || [ "$TARGET_VERSION" = "null" ]; then
            echo "::error::Failed to fetch Claude Code version from npm"
            exit 1
          fi
          echo "Latest Claude Code: $TARGET_VERSION"

          LATEST_RELEASE=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName // "0.0.0"')
          REPO_VERSION=$(echo "$LATEST_RELEASE" | sed "s/^${{ env.IMAGE_TAG }}-//")
          echo "Repo version: $REPO_VERSION"

          if [ "${FORCE_BUILD}" = "true" ] || [ "$TARGET_VERSION" != "$REPO_VERSION" ]; then
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
            echo "version=${TARGET_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "Already at $TARGET_VERSION, skipping"
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Build ─────────────────────────────────────────────────────────
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [lint, check-release]
    if: |
      always() &&
      needs.check-release.outputs.skip_build == 'false' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          IMAGE_TAG="${{ env.REGISTRY }}/${{ github.repository }}:${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          platforms: linux/amd64

  # ── Test ──────────────────────────────────────────────────────────
  test:
    name: Test Image
    runs-on: ubuntu-latest
    needs: [build, check-release]
    if: needs.check-release.outputs.skip_build == 'false'
    steps:
      - name: Install crane
        run: |
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${{ env.CRANE_VERSION }}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          sudo mv crane /usr/local/bin/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ${{ env.REGISTRY }} -u ${{ env.REGISTRY_USER }} --password-stdin

      - name: Verify manifest and binary
        run: |
          crane manifest ${{ needs.build.outputs.image_tag }}
          crane export ${{ needs.build.outputs.image_tag }} - | tar -xf - usr/local/bin/claude
          ls -la usr/local/bin/claude
          echo "Claude binary verified"

  # ── Deploy ────────────────────────────────────────────────────────
  deploy:
    name: Deploy Tags
    runs-on: ubuntu-latest
    needs: [test, build, check-release]
    if: github.event_name != 'pull_request' && needs.check-release.outputs.skip_build == 'false'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Install crane
        run: |
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${{ env.CRANE_VERSION }}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          sudo mv crane /usr/local/bin/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ${{ env.REGISTRY }} -u ${{ env.REGISTRY_USER }} --password-stdin

      - name: Tag latest and version
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ github.repository }}"
          crane copy ${{ needs.build.outputs.image_tag }} "${IMAGE_BASE}:${{ env.IMAGE_TAG }}"
          if [ -n "$VERSION" ] && [ "$VERSION" != "null" ]; then
            crane copy ${{ needs.build.outputs.image_tag }} "${IMAGE_BASE}:${{ env.IMAGE_TAG }}-${VERSION}"
          fi

  # ── Release ───────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [deploy, check-release]
    if: github.event_name != 'pull_request' && needs.check-release.outputs.skip_build == 'false'
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          [ -z "$VERSION" ] || [ "$VERSION" = "null" ] && exit 0
          IMAGE_BASE="${{ env.REGISTRY }}/${{ github.repository }}"
          gh release create "${{ env.IMAGE_TAG }}-${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "vscode-claude-code: Claude Code ${VERSION}" \
            --notes "## Docker Mod: vscode-claude-code

Installs [Claude Code](https://docs.anthropic.com/en/docs/claude-code/overview) CLI into [linuxserver/code-server](https://docs.linuxserver.io/images/docker-code-server/) containers.

### Image tags
| Tag | Description |
|-----|-------------|
| \`${IMAGE_BASE}:vscode-claude-code\` | Always latest |
| \`${IMAGE_BASE}:vscode-claude-code-${VERSION}\` | Pinned to this version |

### Usage
\`\`\`yaml
environment:
  - DOCKER_MODS=${IMAGE_BASE}:vscode-claude-code
  - ANTHROPIC_API_KEY=sk-ant-your-key-here
\`\`\`"

  # ── Cleanup ───────────────────────────────────────────────────────
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy, build, check-release]
    if: always() && needs.check-release.outputs.skip_build == 'false' && needs.build.outputs.image_tag != ''
    permissions:
      packages: write
    steps:
      - name: Install crane
        run: |
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${{ env.CRANE_VERSION }}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          sudo mv crane /usr/local/bin/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ${{ env.REGISTRY }} -u ${{ env.REGISTRY_USER }} --password-stdin

      - name: Delete temporary SHA tag
        run: crane delete ${{ needs.build.outputs.image_tag }} || true
