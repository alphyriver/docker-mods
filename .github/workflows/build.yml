name: CI/CD Pipeline

on:
  push:
    branches: [code-server-java]
  pull_request:
    branches: [code-server-java]
  schedule:
    - cron: '0 18 * * 0'  # Weekly Sunday 02:00 SGT
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if version already exists'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: code-server-java
  JAVA_LTS_VERSION: "21"
  REGISTRY: ghcr.io
  REGISTRY_USER: ${{ github.repository_owner }}
  CRANE_VERSION: v0.20.2

jobs:
  # ── Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest

    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # ── Check Release ─────────────────────────────────────────────────
  check-release:
    name: Check Upstream Release
    runs-on: ubuntu-latest

    outputs:
      skip_build: ${{ steps.check.outputs.skip_build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check for new upstream release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_BUILD: ${{ inputs.force_build }}
        run: |
          TARGET_VERSION=$(curl -fsSL "https://api.adoptium.net/v3/assets/feature_releases/${{ env.JAVA_LTS_VERSION }}/ga?architecture=x64&heap_size=normal&image_type=jdk&jvm_impl=hotspot&os=linux&page=0&page_size=1&project=jdk&sort_method=DEFAULT&sort_order=DESC&vendor=eclipse" | jq -r '.[0].version_data.semver')
          if [ -z "$TARGET_VERSION" ] || [ "$TARGET_VERSION" = "null" ]; then
            echo "::error::Failed to fetch Temurin version"
            exit 1
          fi
          echo "Latest Temurin: $TARGET_VERSION"

          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "version=${TARGET_VERSION}" >> "$GITHUB_OUTPUT"
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_RELEASE=$(gh release list --repo "${{ github.repository }}" --limit 10 --json tagName --jq '[.[].tagName | select(startswith("code-server-java-"))] | .[0] // "0.0.0"')
          REPO_VERSION=$(echo "$LATEST_RELEASE" | sed 's/^code-server-java-//')
          SAFE_TARGET="${TARGET_VERSION//+/_}"
          echo "Repo version: $REPO_VERSION"

          if [ "${FORCE_BUILD}" = "true" ] || [ "$SAFE_TARGET" != "$REPO_VERSION" ]; then
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
            echo "version=${TARGET_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "Already at $TARGET_VERSION"
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Build ─────────────────────────────────────────────────────────
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [lint, check-release]
    if: |
      always() &&
      needs.check-release.outputs.skip_build == 'false' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          IMAGE_TAG="${{ env.REGISTRY }}/${{ github.repository }}:${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          platforms: linux/amd64
          build-args: JAVA_LTS_VERSION=${{ env.JAVA_LTS_VERSION }}

  # ── Test ──────────────────────────────────────────────────────────
  test:
    name: Test Image
    runs-on: ubuntu-latest
    needs: [build, check-release]
    if: needs.check-release.outputs.skip_build == 'false'
    steps:
      - name: Install crane
        run: |
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${{ env.CRANE_VERSION }}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          sudo mv crane /usr/local/bin/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ${{ env.REGISTRY }} -u ${{ env.REGISTRY_USER }} --password-stdin

      - name: Verify manifest and binary
        run: |
          crane manifest ${{ needs.build.outputs.image_tag }}
          crane export ${{ needs.build.outputs.image_tag }} - | tar -xf - usr/local/lib/jdk/bin/java
          ls -la usr/local/lib/jdk/bin/java
          echo "Java binary verified"

  # ── Deploy ────────────────────────────────────────────────────────
  deploy:
    name: Deploy Tags
    runs-on: ubuntu-latest
    needs: [test, build, check-release]
    if: github.event_name != 'pull_request' && needs.check-release.outputs.skip_build == 'false'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Install crane
        run: |
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${{ env.CRANE_VERSION }}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          sudo mv crane /usr/local/bin/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ${{ env.REGISTRY }} -u ${{ env.REGISTRY_USER }} --password-stdin

      - name: Tag latest and version
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          SAFE_VERSION="${VERSION//+/_}"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ github.repository }}"
          crane copy ${{ needs.build.outputs.image_tag }} "${IMAGE_BASE}:${{ env.IMAGE_TAG }}"
          if [ -n "$VERSION" ] && [ "$VERSION" != "null" ]; then
            crane copy ${{ needs.build.outputs.image_tag }} "${IMAGE_BASE}:${{ env.IMAGE_TAG }}-${SAFE_VERSION}"
          fi

  # ── Release ───────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [deploy, check-release]
    if: github.event_name != 'pull_request' && needs.check-release.outputs.skip_build == 'false'
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          [ -z "$VERSION" ] || [ "$VERSION" = "null" ] && exit 0
          SAFE_VERSION="${VERSION//+/_}"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ github.repository }}"
          {
            echo "## Docker Mod: code-server-java"
            echo ""
            echo "Installs [Eclipse Temurin](https://adoptium.net/) LTS JDK into [linuxserver/code-server](https://docs.linuxserver.io/images/docker-code-server/) containers."
            echo ""
            echo "### Image tags"
            echo "| Tag | Description |"
            echo "|-----|-------------|"
            echo "| \`${IMAGE_BASE}:code-server-java\` | Always latest |"
            echo "| \`${IMAGE_BASE}:code-server-java-${SAFE_VERSION}\` | Pinned to this version |"
            echo ""
            echo "### Usage"
            echo '```yaml'
            echo "environment:"
            echo "  - DOCKER_MODS=\${IMAGE_BASE}:code-server-java"
            echo '```'
          } > /tmp/release-notes.md
          gh release create "${{ env.IMAGE_TAG }}-${SAFE_VERSION}" \
            --repo "${{ github.repository }}" \
            --title "code-server-java: Temurin JDK ${VERSION}" \
            --notes-file /tmp/release-notes.md

  # ── Cleanup ───────────────────────────────────────────────────────
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy, build, check-release]
    if: always() && needs.check-release.outputs.skip_build == 'false' && needs.build.outputs.image_tag != ''
    permissions:
      packages: write
    steps:
      - name: Install crane
        run: |
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${{ env.CRANE_VERSION }}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          sudo mv crane /usr/local/bin/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ${{ env.REGISTRY }} -u ${{ env.REGISTRY_USER }} --password-stdin

      - name: Delete temporary SHA tag
        run: crane delete ${{ needs.build.outputs.image_tag }} || true
