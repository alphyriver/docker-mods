name: Build and Push Docker Mod

on:
  push:
    branches:
      - vscode-claude-code
  pull_request:
    branches:
      - vscode-claude-code
  workflow_dispatch:

env:
  IMAGE_TAG: vscode-claude-code
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      docker:
        image: docker:29.1.5-dind-alpine3.23
        credentials:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: ""

    container:
      image: docker:29.1.5-alpine3.23
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    env:
      DOCKER_HOST: tcp://docker:2375
      DOCKER_TLS_CERTDIR: ""

    steps:
      - name: Install base dependencies
        run: |
          apk add --no-cache git nodejs bash curl sed
          [ -f /usr/bin/node ] || ln -s /usr/bin/nodejs /usr/bin/node
          git config --global --add safe.directory "*"

      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive registry host and image base
        id: meta
        run: |
          REGISTRY_HOST=$(echo "${{ github.server_url }}" | sed 's|https://||')
          IMAGE_BASE="${REGISTRY_HOST}/${{ github.repository }}"
          echo "registry_host=${REGISTRY_HOST}" >> $GITHUB_OUTPUT
          echo "image_base=${IMAGE_BASE}" >> $GITHUB_OUTPUT
          echo "Registry: ${REGISTRY_HOST}"
          echo "Image base: ${IMAGE_BASE}"

      - name: Wait for Docker daemon
        run: |
          echo "Waiting for Docker daemon..."
          timeout=60
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon is ready (${elapsed}s)"
              break
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          if ! docker info >/dev/null 2>&1; then
            echo "ERROR: Docker daemon failed to start"
            exit 1
          fi
          docker version

      - name: Set up QEMU
        run: |
          docker run --rm --privileged \
            tonistiigi/binfmt:latest \
            --install arm64

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name multiarch --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Login to Forgejo registry
        if: github.event_name == 'push'
        env:
          REGISTRY_USER: ${{ github.repository_owner }}
          APPLICATION_TOKEN: ${{ secrets.APPLICATION_TOKEN }}
        run: |
          echo "${APPLICATION_TOKEN}" | \
            docker login "${{ steps.meta.outputs.registry_host }}" \
              -u "${REGISTRY_USER}" \
              --password-stdin

      - name: Build and push
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.image_base }}:${IMAGE_TAG}"
          echo "Building: ${IMAGE_TAG}"

          PUSH_FLAG=""
          if [ "${{ github.event_name }}" = "push" ]; then
            PUSH_FLAG="--push"
          fi

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "${IMAGE_TAG}" \
            ${PUSH_FLAG} \
            .

      - name: Smoke test (amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -t mod-test:amd64 .

          MOD_ID=$(docker create --entrypoint /bin/true mod-test:amd64)
          docker cp "${MOD_ID}:/usr/local/bin/claude" ./claude-amd64
          docker rm "${MOD_ID}"
          chmod +x ./claude-amd64

          docker run --rm \
            -v "${PWD}/claude-amd64:/usr/local/bin/claude:ro" \
            ghcr.io/linuxserver/baseimage-ubuntu:noble \
            /usr/local/bin/claude --version

          rm ./claude-amd64
