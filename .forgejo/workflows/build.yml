name: Build and Push Docker Mod

on:
  push:
    branches:
      - vscode-claude-code
  pull_request:
    branches:
      - vscode-claude-code
  workflow_dispatch:

env:
  IMAGE_TAG: vscode-claude-code

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Set up QEMU
        uses: https://github.com/docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: https://github.com/docker/setup-buildx-action@v3

      - name: Log in to registry
        if: github.event_name == 'push'
        uses: https://github.com/docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push
        uses: https://github.com/docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ secrets.REGISTRY_URL }}/docker-mods:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -t mod-test:amd64 .
          MOD_ID=$(docker create --entrypoint /bin/true mod-test:amd64)
          docker cp "${MOD_ID}:/usr/local/bin/claude" ./claude-amd64
          docker rm "${MOD_ID}"
          chmod +x ./claude-amd64
          docker run --rm \
            -v "${PWD}/claude-amd64:/usr/local/bin/claude:ro" \
            ghcr.io/linuxserver/baseimage-ubuntu:noble \
            /usr/local/bin/claude --version
          rm ./claude-amd64
