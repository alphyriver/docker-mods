name: CI/CD Pipeline

on:
  push:
    branches:
      - vscode-claude-code
  pull_request:
    branches:
      - vscode-claude-code
  workflow_dispatch:

# Prevent duplicate runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: vscode-claude-code
  REGISTRY_USER: package-bot
  CRANE_VERSION: v0.20.2
  HADOLINT_VERSION: v2.12.0-alpine

jobs:
  # ── Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Run Hadolint
        uses: https://github.com/hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # ── Metadata ──────────────────────────────────────────────────────
  metadata:
    name: Build Metadata
    runs-on: ubuntu-latest
    outputs:
      registry_host: ${{ steps.meta.outputs.registry_host }}
      image_base: ${{ steps.meta.outputs.image_base }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Derive registry and image metadata
        id: meta
        run: |
          REGISTRY_HOST=$(echo "${{ github.server_url }}" | sed 's|https://||')
          IMAGE_BASE="${REGISTRY_HOST}/${{ github.repository }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "registry_host=${REGISTRY_HOST}" >> "$GITHUB_OUTPUT"
          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_BASE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Registry: ${REGISTRY_HOST}"
          echo "Building: ${IMAGE_BASE}:${SHORT_SHA}"

  # ── Build ────────────────────────────────────────────────────────
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [lint, metadata]
    outputs:
      image_tag: ${{ needs.metadata.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Create build context
        run: |
          tar -czf /tmp/context.tar.gz -C ${{ github.workspace }} .
          cp /tmp/context.tar.gz ${{ github.workspace }}/context.tar.gz

      - name: Build and push with Kaniko
        uses: docker://gcr.io/kaniko-project/executor:v1.23.2-debug
        with:
          entrypoint: /busybox/sh
          args: >-
            -c "AUTH=$(echo -n '${{ env.REGISTRY_USER }}:${{ secrets.APPLICATION_TOKEN }}' | base64) &&
            mkdir -p /kaniko/.docker &&
            printf '{\"auths\":{\"${{ needs.metadata.outputs.registry_host }}\":{\"auth\":\"%s\"}}}' $AUTH > /kaniko/.docker/config.json &&
            TARBALL=$(find / -name 'context.tar.gz' 2>/dev/null | head -1) &&
            /kaniko/executor
            --context=tar://$TARBALL
            --dockerfile=Dockerfile
            --destination=${{ needs.metadata.outputs.image_tag }}
            --custom-platform=linux/amd64
            --build-arg=TARGETPLATFORM=linux/amd64"

  # ── Test ──────────────────────────────────────────────────────────
  test:
    name: Test Image
    runs-on: ubuntu-latest
    needs: [build, metadata]
    steps:
      - name: Install crane
        run: |
          apt-get update && apt-get install -y curl
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${{ env.CRANE_VERSION }}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          mv crane /usr/local/bin/

      - name: Login to registry
        run: |
          echo "${{ secrets.APPLICATION_TOKEN }}" | crane auth login ${{ needs.metadata.outputs.registry_host }} -u ${{ env.REGISTRY_USER }} --password-stdin

      - name: Verify image manifest
        run: |
          crane manifest ${{ needs.metadata.outputs.image_tag }}
          echo "Image verified: ${{ needs.metadata.outputs.image_tag }}"

      - name: Smoke test — verify claude binary
        run: |
          crane export ${{ needs.metadata.outputs.image_tag }} - | tar -xf - usr/local/bin/claude
          ls -la usr/local/bin/claude
          file usr/local/bin/claude
          echo "Claude binary verified in image"

  # ── Security Scan ────────────────────────────────────────────────
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test, metadata]
    steps:
      - name: Install Trivy
        run: |
          apt-get update
          apt-get install -y wget apt-transport-https gnupg lsb-release jq
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | tee /etc/apt/sources.list.d/trivy.list
          apt-get update
          apt-get install -y trivy

      - name: Run vulnerability scan
        env:
          TRIVY_USERNAME: ${{ env.REGISTRY_USER }}
          TRIVY_PASSWORD: ${{ secrets.APPLICATION_TOKEN }}
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            ${{ needs.metadata.outputs.image_tag }}

          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format json \
            --output trivy-results.json \
            ${{ needs.metadata.outputs.image_tag }}

      - name: Analyze results
        run: |
          if [ -f trivy-results.json ]; then
            VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH")] | length' trivy-results.json)
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "::warning::Found $VULN_COUNT high/critical vulnerabilities"
              jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH")] | .[] | "\(.Severity): \(.VulnerabilityID) in \(.PkgName)"' trivy-results.json
            else
              echo "No high/critical vulnerabilities found"
            fi
          fi

      - name: Upload scan results
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 7

  # ── Deploy ────────────────────────────────────────────────────────
  deploy:
    name: Deploy Tags
    runs-on: ubuntu-latest
    needs: [scan, metadata]
    if: github.event_name == 'push'
    steps:
      - name: Install crane
        run: |
          apt-get update && apt-get install -y curl
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${{ env.CRANE_VERSION }}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          mv crane /usr/local/bin/

      - name: Login to registry
        run: |
          echo "${{ secrets.APPLICATION_TOKEN }}" | crane auth login ${{ needs.metadata.outputs.registry_host }} -u ${{ env.REGISTRY_USER }} --password-stdin

      - name: Tag as release
        run: |
          FINAL_TAG="${{ needs.metadata.outputs.image_base }}:${{ env.IMAGE_TAG }}"
          echo "Tagging: ${FINAL_TAG}"
          crane copy ${{ needs.metadata.outputs.image_tag }} "${FINAL_TAG}"
          echo "Deployed: ${FINAL_TAG}"

  # ── Cleanup ───────────────────────────────────────────────────────
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy, metadata]
    if: always() && needs.metadata.outputs.image_tag != ''
    steps:
      - name: Install crane
        run: |
          apt-get update && apt-get install -y curl
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${{ env.CRANE_VERSION }}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          mv crane /usr/local/bin/

      - name: Login to registry
        run: |
          echo "${{ secrets.APPLICATION_TOKEN }}" | crane auth login ${{ needs.metadata.outputs.registry_host }} -u ${{ env.REGISTRY_USER }} --password-stdin

      - name: Delete temporary tag
        run: |
          echo "Cleaning up temporary tag: ${{ needs.metadata.outputs.image_tag }}"
          crane delete ${{ needs.metadata.outputs.image_tag }} || true
          echo "Cleanup complete"
